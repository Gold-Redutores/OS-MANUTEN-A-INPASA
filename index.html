<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Relatório de Manutenção - Gold Redutores</title>
    <style>
        :root { --cor-primaria: #003366; --cor-secundaria: #ed1c24; }
        body { font-family: Arial, sans-serif; margin: 20px; color: var(--cor-primaria); background-color: #fff; }
        .header { text-align: center; border-bottom: 3px solid var(--cor-secundaria); padding-bottom: 10px; margin-bottom: 10px; }
        .header h2 { margin: 0; font-size: 24px; text-transform: uppercase; }
        .section { background: #d9d9d9; padding: 6px; margin-top: 15px; font-weight: bold; text-align: center; border: 1px solid #333; text-transform: uppercase; font-size: 13px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-bottom: 0; }
        table, th, td { border: 1px solid #333; }
        td { padding: 6px; font-size: 11px; vertical-align: middle; }
        th { background: #eee; padding: 8px; font-size: 11px; text-align: center; color: var(--cor-primaria); }
        input[type="text"], input[type="number"], textarea { width: 98%; border: none; outline: none; background: transparent; font-size: 11px; color: #000; }
        
        .checkbox-container { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .checkbox-container input { width: auto; margin: 0; }

        /* Estilo Área de Assinatura baseado na referência */
        .area-assinaturas { margin-top: 30px; }
        .linha-assinaturas { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .caixa-assinatura { text-align: center; flex: 1; min-width: 300px; max-width: 400px; }
        .tela-assinatura { border: 1px sólido #ccc; background: #fafafa; width: 100%; height: 120px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; }
        .nome-legivel { border-bottom: 1px dashed #ccc !important; text-align: center; font-weight: bold; margin-bottom: 5px; width: 100% !important; }
        .legenda-assinatura { font-weight: bold; font-size: 10px; text-transform: uppercase; color: var(--cor-primaria); }

        .foto-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .foto-item { border: 1px solid #333; padding: 8px; text-align: center; background: #fff; position: relative; page-break-inside: avoid; display: flex; flex-direction: column; }
        .foto-preview { max-width: 100%; height: auto; max-height: 300px; object-fit: contain; margin-bottom: 8px; }

        .btn-group { text-align: right; margin-top: 30px; display: flex; justify-content: flex-end; gap: 10px; }
        button { padding: 14px 28px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-pdf { background: var(--cor-primaria); }
        .btn-wpp { background: #25d366; }

        @media print { 
            .no-print, .btn-group, .btn-remove { display: none !important; } 
            .tela-assinatura { background: transparent !important; border: 1px solid #000; }
            body { margin: 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>RELATÓRIO DE MANUTENÇÃO PREVENTIVA</h2>
        <div style="margin-top: 10px;">
            <label style="font-weight: bold;">Nº ORDEM DE SERVIÇO: </label>
            <input type="text" id="input-os" style="width: 150px; border-bottom: 2px solid var(--cor-secundaria); text-align: center; font-weight: bold; font-size: 18px;" placeholder="Ex: 5449">
        </div>
    </div>

    <div class="section">DADOS DO CLIENTE E EQUIPAMENTO</div>
    <table>
        <tr>
            <td colspan="2"><label><strong>Cliente:</strong></label> <input type="text" id="campo-cliente"></td>
            <td colspan="2"><label><strong>Data:</strong></label> <span id="data-atual" style="font-weight: bold;"></span></td>
        </tr>
        <tr>
            <td><label><strong>Equipamento:</strong></label> <input type="text" id="campo-equip"></td>
            <td><label><strong>Redução:</strong></label> <input type="text" id="campo-reducao"></td>
            <td colspan="2"><label><strong>Série:</strong></label> <input type="text" id="campo-serie"></td>
        </tr>
    </table>

    <div class="section">LEITURAS FINAIS (ACOPLAMENTO)</div>
    <table>
        <thead>
            <tr>
                <th>Posição da Medição</th>
                <th>Radial / Offset (mm)</th>
                <th>Angular / Gap (mm)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td style="text-align: center; font-weight: bold;">Vertical (0° - 180°)</td>
                <td><input type="text" style="text-align: center;" placeholder="0,00"></td>
                <td><input type="text" style="text-align: center;" placeholder="0,00"></td>
            </tr>
            <tr>
                <td style="text-align: center; font-weight: bold;">Horizontal (90° - 270°)</td>
                <td><input type="text" style="text-align: center;" placeholder="0,00"></td>
                <td><input type="text" style="text-align: center;" placeholder="0,00"></td>
            </tr>
        </tbody>
    </table>

    <div class="section">ANÁLISES FOTOGRÁFICAS</div>
    <div id="container-fotos" class="foto-container"></div>

    <div class="section">CONCLUSÕES</div>
    <textarea id="conclusoes" rows="5" style="width: 100%; border: 1px solid #333; margin-top: 5px; padding: 8px;" placeholder="Parecer técnico final..."></textarea>

    <div class="area-assinaturas">
        <div class="linha-assinaturas">
            <div class="caixa-assinatura">
                <div class="tela-assinatura"></div>
                <input type="text" class="nome-legivel" placeholder="NOME LEGÍVEL">
                <div class="legenda-assinatura">Técnico Responsável</div>
            </div>
            <div class="caixa-assinatura">
                <div class="tela-assinatura"></div>
                <input type="text" class="nome-legivel" placeholder="NOME LEGÍVEL">
                <div class="legenda-assinatura">Responsável da Empresa</div>
            </div>
        </div>
        <div class="linha-assinaturas">
            <div class="caixa-assinatura">
                <div class="tela-assinatura"></div>
                <input type="text" class="nome-legivel" placeholder="NOME LEGÍVEL">
                <div class="legenda-assinatura">Responsável Manutenção</div>
            </div>
        </div>
    </div>

    <div class="btn-group no-print">
        <button class="btn-wpp" onclick="alert('Funcionalidade de WhatsApp')">ENVIAR WHATSAPP</button>
        <button class="btn-pdf" onclick="window.print()">IMPRIMIR / GERAR PDF</button>
    </div>

    <script>
        window.onload = () => {
            document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR');
        };
    </script>
</body>
</html>
